# -------------------------------------------------------
# HeartOP - Application Configuration
# -------------------------------------------------------

# Server
server.port=8081

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/heartop
spring.datasource.username=${DB_USERNAME:heartop}
spring.datasource.password=${DB_PASSWORD:heartop}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# API Key (override via environment variable in production)
heartop.api.key=${API_KEY:heartop-dev-key-2026}

# Alert Thresholds
heartop.alerts.temperature.max=35.0
heartop.alerts.temperature.min=0.0
heartop.alerts.humidity.max=80.0
heartop.alerts.humidity.min=20.0
heartop.alerts.gas.danger=2500
heartop.alerts.gas.warning=1000
